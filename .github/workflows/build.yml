name: build

# 打 tag（v 开头，如 v0.1.0）即触发构建并把产物附到 GitHub Release。
# 也可在 Actions 页手动触发 workflow_dispatch 跑一次，只产出 Artifacts。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  # 在仓库 Settings ▸ Secrets and variables ▸ Actions ▸ Variables 里建一个
  # 名为 APP_URL 的变量，值=你的对外地址（如 https://music.yourdomain.com/music）。
  # 不设也能构建，但会用占位域名（装出来打不开），所以请务必设置。
  APP_URL: ${{ vars.APP_URL }}

jobs:
  # ---------- Windows 桌面：.exe(NSIS) + .msi ----------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install JS deps
        run: npm install
      - name: Inject APP_URL
        if: env.APP_URL != ''
        shell: bash
        run: node scripts/set-app-url.mjs "$APP_URL"
      - name: Build (Tauri desktop)
        run: npm run tauri build
      - name: Upload installers (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: anon-music-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  # ---------- 安卓：.apk（在 Linux 上构建） ----------
  android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: '26.3.11579264'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;${NDK_VERSION}" "platforms;android-34" "build-tools;34.0.0"
      - name: Export NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install JS deps
        run: npm install
      - name: Inject APP_URL
        if: env.APP_URL != ''
        run: node scripts/set-app-url.mjs "$APP_URL"
      - name: Init Android project
        run: npm run tauri android init
      - name: Inject native media controls (Kotlin + manifest)
        run: node scripts/android-inject.mjs
      # 签名密钥：只需配一个 Secret「ANDROID_KEYSTORE_BASE64」(钥匙的 base64)。
      # 别名固定 anon、密码固定 anonmusic(写在这里没关系——钥匙本体在 Secret 里、不在仓库，
      # 光有密码没有钥匙文件也签不了)。配了 Secret = 每次同一把钥匙 → 可免卸载覆盖升级；
      # 没配则回退临时随机 debug 密钥(每次不同，仅供测试，需卸载重装)。
      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/app/anon.keystore
            cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=anon.keystore
          password=anonmusic
          keyAlias=anon
          EOF
            echo "✅ 使用 Secret 里的固定签名密钥（稳定签名，可免卸载覆盖升级）"
          else
            keytool -genkeypair -v -keystore src-tauri/gen/android/app/anon.keystore -alias anon \
              -storetype PKCS12 -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Anon Music, OU=Dev, O=Anon, L=NA, S=NA, C=NA"
            cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=anon.keystore
          password=android
          keyAlias=anon
          EOF
            echo "⚠️ 未配置 ANDROID_KEYSTORE_BASE64，回退临时 debug 密钥（每次构建不同，需卸载重装）"
          fi
      - name: Build APK
        env:
          ANDROID_KEYSTORE_PROPERTIES: ${{ github.workspace }}/src-tauri/gen/android/keystore.properties
        run: npm run tauri android build -- --apk
      # Tauri 生成的 build.gradle 没把 release signingConfig 接上 → 产出 *-release-unsigned.apk。
      # 这里用 apksigner 显式签名兜底（不依赖 Gradle 配置，必出签名包），并删掉未签名的。
      - name: Sign APK (apksigner)
        run: |
          set -e
          BT=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -1)
          echo "build-tools: $BT"
          KS="$GITHUB_WORKSPACE/src-tauri/gen/android/app/anon.keystore"
          PROPS="$GITHUB_WORKSPACE/src-tauri/gen/android/keystore.properties"
          PASS=$(grep -E '^password=' "$PROPS" | head -1 | cut -d= -f2-)
          ALIAS=$(grep -E '^keyAlias=' "$PROPS" | head -1 | cut -d= -f2-)
          OUTDIR="$GITHUB_WORKSPACE/src-tauri/gen/android/app/build/outputs/apk"
          shopt -s globstar nullglob
          signed=0
          for APK in "$OUTDIR"/**/*-unsigned.apk; do
            OUT="${APK%-unsigned.apk}.apk"
            "${BT}zipalign" -f 4 "$APK" "$OUT"
            "${BT}apksigner" sign --ks "$KS" --ks-pass pass:"$PASS" \
              --ks-key-alias "$ALIAS" --key-pass pass:"$PASS" \
              --v1-signing-enabled true --v2-signing-enabled true "$OUT"
            "${BT}apksigner" verify -v "$OUT"
            rm -f "$APK"
            echo "✅ signed: $OUT"
            signed=1
          done
          [ "$signed" = "1" ] || echo "无 -unsigned.apk（可能已签名），跳过"
          ls -la "$OUTDIR"/**/release/ || true
      - name: Upload APK (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: anon-music-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
