name: build

# 打 tag（v 开头，如 v0.1.0）即触发构建并把产物附到 GitHub Release。
# 也可在 Actions 页手动触发 workflow_dispatch 跑一次，只产出 Artifacts。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  # 在仓库 Settings ▸ Secrets and variables ▸ Actions ▸ Variables 里建一个
  # 名为 APP_URL 的变量，值=你的对外地址（如 https://music.yourdomain.com/music）。
  # 不设也能构建，但会用占位域名（装出来打不开），所以请务必设置。
  APP_URL: ${{ vars.APP_URL }}

jobs:
  # ---------- Windows 桌面：.exe(NSIS) + .msi ----------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install JS deps
        run: npm install
      - name: Inject APP_URL
        if: env.APP_URL != ''
        shell: bash
        run: node scripts/set-app-url.mjs "$APP_URL"
      - name: Build (Tauri desktop)
        run: npm run tauri build
      - name: Upload installers (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: anon-music-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  # ---------- 安卓：.apk（在 Linux 上构建） ----------
  android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: '26.3.11579264'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;${NDK_VERSION}" "platforms;android-34" "build-tools;34.0.0"
      - name: Export NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install JS deps
        run: npm install
      - name: Inject APP_URL
        if: env.APP_URL != ''
        run: node scripts/set-app-url.mjs "$APP_URL"
      - name: Init Android project
        run: npm run tauri android init
      - name: Generate signing keystore (debug-grade, 可 sideload 安装)
        run: |
          KS="src-tauri/gen/android/app/anon.keystore"
          keytool -genkeypair -v -keystore "$KS" -alias anon \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Anon Music, OU=Dev, O=Anon, L=NA, S=NA, C=NA"
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=anon.keystore
          storePassword=android
          keyAlias=anon
          password=android
          EOF
      - name: Build APK
        run: npm run tauri android build -- --apk
      - name: Upload APK (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: anon-music-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
