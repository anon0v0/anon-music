<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桌面歌词</title>
  <style>
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      user-select: none; cursor: default; }
    /* 整条做拖动区；hover 时才出现半透明底，便于看清/操作 */
    #bar { position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; box-sizing: border-box;
      border-radius: 16px; transition: background .18s, box-shadow .18s; }
    #bar:hover { background: rgba(10,10,14,.62); box-shadow: 0 12px 44px rgba(0,0,0,.5); }
    #cur { max-width: 100%; font-weight: 800; line-height: 1.35; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; color: var(--hl, #fff);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.92)) drop-shadow(0 0 2px rgba(0,0,0,.95)); }
    /* 逐字渐变填充（与 app 内桌面歌词一致） */
    #cur .kw { background: linear-gradient(90deg, var(--hl,#fff) calc(var(--p,0%) - 1.5%), rgba(255,255,255,.42) calc(var(--p,0%) + 1.5%));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
    #next { max-width: 100%; font-size: 13px; line-height: 1.3; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; opacity: .62; color: var(--hl, #fff);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.9)); display: none; }
    /* 悬停工具条 */
    #tools { position: absolute; top: 6px; right: 12px; display: flex; gap: 14px; opacity: 0; transition: opacity .2s; }
    #bar:hover #tools { opacity: 1; }
    #tools button { background: none; border: none; color: rgba(255,255,255,.7); cursor: pointer;
      font-size: 16px; line-height: 1; padding: 2px; }
    #tools button:hover { color: #fff; }
  </style>
</head>
<body>
  <div id="bar" data-tauri-drag-region>
    <div id="tools">
      <button id="prev" title="上一句/上一首">⏮</button>
      <button id="next-btn" title="下一句/下一首">⏭</button>
      <button id="close" title="关闭桌面歌词">✕</button>
    </div>
    <div id="cur" data-tauri-drag-region>♪ Anon Music</div>
    <div id="next" data-tauri-drag-region></div>
  </div>

  <script>
    const T = window.__TAURI__;
    const ev = T && T.event;
    const win = T && T.window && T.window.getCurrentWindow ? T.window.getCurrentWindow() : null;
    const $cur = document.getElementById('cur');
    const $next = document.getElementById('next');
    let shown = false;

    async function setShown(v) {
      if (!win || v === shown) return;
      shown = v;
      try { v ? await win.show() : await win.hide(); } catch (e) {}
    }

    function render(p) {
      // 字号 / 颜色（由 app 设置驱动）
      if (p.fontSize) $cur.style.fontSize = p.fontSize + 'px';
      if (p.color) document.documentElement.style.setProperty('--hl', p.color);
      // 当前行（html 已含逐字 --p 状态）
      if (typeof p.html === 'string') $cur.innerHTML = p.html;
      // 下一行
      if (p.doubleRow && p.next) { $next.textContent = p.next; $next.style.display = 'block'; }
      else { $next.style.display = 'none'; }
    }

    if (ev) {
      ev.listen('desk-lyric', (e) => {
        const p = e.payload || {};
        if (p.show === false) { setShown(false); return; }
        setShown(true);
        render(p);
      });
    }

    const emitCtl = (action) => { if (ev) { try { ev.emit('lyrics-ctl', { action }); } catch (e) {} } };
    document.getElementById('prev').onclick = (e) => { e.stopPropagation(); emitCtl('prev'); };
    document.getElementById('next-btn').onclick = (e) => { e.stopPropagation(); emitCtl('next'); };
    document.getElementById('close').onclick = (e) => { e.stopPropagation(); emitCtl('off'); setShown(false); };
  </script>
</body>
</html>
