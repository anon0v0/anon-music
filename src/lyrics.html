<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桌面歌词</title>
  <style>
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      user-select: none; cursor: default; }
    #bar { position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px; padding: 8px 18px; box-sizing: border-box;
      border-radius: 16px; transition: background .18s, box-shadow .18s; }
    #bar:hover { background: rgba(10,10,14,.6); box-shadow: 0 12px 44px rgba(0,0,0,.5); }
    body.locked #bar:hover { background: transparent; box-shadow: none; }
    /* 工具条：悬停显示；锁定时不显示 */
    #tools { position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: 12px;
      background: rgba(20,20,28,.92); border: 1px solid rgba(255,255,255,.1);
      opacity: 0; pointer-events: none; transition: opacity .18s; z-index: 3; }
    #bar:hover #tools { opacity: 1; pointer-events: auto; }
    body.locked #tools { display: none; }
    #tools button { background: none; border: none; color: rgba(255,255,255,.82); cursor: pointer;
      width: 30px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 7px; padding: 0; }
    #tools button:hover { background: rgba(255,255,255,.14); color: #fff; }
    #tools button.on { color: var(--accent, #22c55e); }
    #tools svg { width: 17px; height: 17px; fill: currentColor; }
    #tools .sep { width: 1px; height: 16px; background: rgba(255,255,255,.18); margin: 0 2px; }
    /* 设置小窗 */
    #panel { position: absolute; top: 38px; left: 50%; transform: translateX(-50%);
      background: rgba(22,22,30,.98); border: 1px solid rgba(255,255,255,.12); border-radius: 12px;
      padding: 10px 12px; min-width: 200px; box-shadow: 0 16px 44px rgba(0,0,0,.6); z-index: 4; display: none; }
    #bar:hover #panel.open { display: block; }
    #panel .pr { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 6px 2px; color: #e8e8ef; font-size: 13px; }
    #panel .pr + .pr { border-top: 1px solid rgba(255,255,255,.08); }
    #panel .grp { display: flex; align-items: center; gap: 8px; }
    #panel .grp button { background: rgba(255,255,255,.08); border: none; color: #e8e8ef; width: 26px; height: 24px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    #panel .grp button:hover { background: rgba(255,255,255,.18); }
    #panel .seg { display: flex; background: rgba(255,255,255,.07); border-radius: 7px; overflow: hidden; }
    #panel .seg button { background: none; border: none; color: #9a9aa6; padding: 4px 12px; cursor: pointer; font-size: 12.5px; }
    #panel .seg button.on { background: var(--accent, #22c55e); color: #04210f; font-weight: 700; }
    #fval { min-width: 26px; text-align: center; font-variant-numeric: tabular-nums; }
    /* 歌词文本 */
    #cur { max-width: 100%; font-weight: 800; line-height: 1.35; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; color: var(--hl, #fff);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.92)) drop-shadow(0 0 2px rgba(0,0,0,.95)); }
    #cur .kw { background: linear-gradient(90deg, var(--hl,#fff) calc(var(--p,0%) - 1.5%), rgba(255,255,255,.42) calc(var(--p,0%) + 1.5%));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
    #next { max-width: 100%; font-size: 14px; line-height: 1.3; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; opacity: .62; color: var(--hl, #fff); filter: drop-shadow(0 2px 8px rgba(0,0,0,.9)); display: none; }
  </style>
</head>
<body>
  <div id="bar" data-tauri-drag-region>
    <div id="tools">
      <button id="prev" title="上一首"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button id="toggle" title="播放/暂停"><svg id="ticon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <button id="next" title="下一首"><svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg></button>
      <span class="sep"></span>
      <button id="lock" title="锁定（点击后鼠标穿透，托盘可解锁）"><svg viewBox="0 0 24 24"><path d="M12 1a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5zm3 8H9V6a3 3 0 0 1 6 0v3z"/></svg></button>
      <button id="settings" title="设置"><svg viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm9 4a7 7 0 0 0-.1-1.2l2-1.6-2-3.4-2.4 1a7.3 7.3 0 0 0-2-1.2l-.4-2.6H9.9l-.4 2.6a7.3 7.3 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.6A7 7 0 0 0 3 12c0 .4 0 .8.1 1.2l-2 1.6 2 3.4 2.4-1c.6.5 1.3.9 2 1.2l.4 2.6h4.2l.4-2.6c.7-.3 1.4-.7 2-1.2l2.4 1 2-3.4-2-1.6c.1-.4.1-.8.1-1.2z"/></svg></button>
      <button id="close" title="关闭桌面歌词"><svg viewBox="0 0 24 24"><path d="M18.3 5.7L12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7l1.4-1.4L10.6 10.6l6.3-6.3z"/></svg></button>
    </div>

    <div id="panel">
      <div class="pr"><span>字体大小</span><span class="grp"><button id="fdec">A−</button><b id="fval">30</b><button id="finc">A+</button></span></div>
      <div class="pr"><span>显示</span><span class="seg"><button id="single" data-rows="single">单行</button><button id="dbl" data-rows="double">双行</button></span></div>
    </div>

    <div id="cur" data-tauri-drag-region>♪ Anon Music</div>
    <div id="next" data-tauri-drag-region></div>
  </div>

  <script>
    const T = window.__TAURI__;
    const ev = T && T.event;
    const win = T && T.window && T.window.getCurrentWindow ? T.window.getCurrentWindow() : null;
    const $ = (id) => document.getElementById(id);
    const $cur = $('cur'), $next = $('next'), $ticon = $('ticon'), $panel = $('panel'), $fval = $('fval');
    const ICON_PLAY = 'M8 5v14l11-7z';
    const ICON_PAUSE = 'M6 5h4v14H6zm8 0h4v14h-4z';
    let shown = false, locked = false;

    async function setShown(v) { if (!win || v === shown) return; shown = v; try { v ? await win.show() : await win.hide(); } catch (e) {} }
    const emitCtl = (action, value) => { if (ev) { try { ev.emit('lyrics-ctl', { action, value }); } catch (e) {} } };

    function render(p) {
      if (p.fontSize) { $cur.style.fontSize = p.fontSize + 'px'; $fval.textContent = p.fontSize; }
      if (p.color) document.documentElement.style.setProperty('--hl', p.color);
      if (typeof p.html === 'string') $cur.innerHTML = p.html;
      if (p.doubleRow && p.next) { $next.textContent = p.next; $next.style.display = 'block'; } else { $next.style.display = 'none'; }
      $ticon.querySelector('path').setAttribute('d', p.playing ? ICON_PAUSE : ICON_PLAY);
      $('single').classList.toggle('on', !p.doubleRow);
      $('dbl').classList.toggle('on', !!p.doubleRow);
    }

    if (ev) {
      ev.listen('desk-lyric', (e) => { const p = e.payload || {}; if (p.show === false) { setShown(false); return; } setShown(true); render(p); });
      // 来自系统托盘「解锁桌面歌词」
      ev.listen('desk-unlock', () => { locked = false; document.body.classList.remove('locked'); if (win) win.setIgnoreCursorEvents(false).catch(() => {}); });
    }

    $('prev').onclick = (e) => { e.stopPropagation(); emitCtl('prev'); };
    $('toggle').onclick = (e) => { e.stopPropagation(); emitCtl('playpause'); };
    $('next').onclick = (e) => { e.stopPropagation(); emitCtl('next'); };
    $('close').onclick = (e) => { e.stopPropagation(); emitCtl('off'); setShown(false); };
    $('settings').onclick = (e) => { e.stopPropagation(); $panel.classList.toggle('open'); $('settings').classList.toggle('on', $panel.classList.contains('open')); };
    $('lock').onclick = (e) => {
      e.stopPropagation(); locked = true; document.body.classList.add('locked'); $panel.classList.remove('open');
      if (win) win.setIgnoreCursorEvents(true).catch(() => {});
    };
    $('fdec').onclick = (e) => { e.stopPropagation(); emitCtl('fontDown'); };
    $('finc').onclick = (e) => { e.stopPropagation(); emitCtl('fontUp'); };
    $('single').onclick = (e) => { e.stopPropagation(); emitCtl('rows', 'single'); };
    $('dbl').onclick = (e) => { e.stopPropagation(); emitCtl('rows', 'double'); };
  </script>
</body>
</html>
